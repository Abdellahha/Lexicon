<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Log in — Lexicon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A0D14;
  --bg-1:#151922;
  --bg-card:#10131A;
  --ink:#F1F5F9;
  --ink-dim:#94A3B8;
  --ink-faint:#64748B;
  --accent:#38BDF8;
  --accent-ink:#0F172A;
  --accent-soft:rgba(56,189,248,0.08);
  --accent-line:rgba(56,189,248,0.25);
  --error:#F87171;
  --error-soft:rgba(248,113,113,0.08);
  --success:#4ADE80;
  --success-soft:rgba(74,222,128,0.08);
  --border:rgba(255,255,255,0.08);
  --font-display:'Fraunces',serif;
  --font-body:'Inter',-apple-system,sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  --shadow:0 12px 45px -10px rgba(0,0,0,0.5);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:var(--font-body);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  display:flex;align-items:center;justify-content:center;
  padding:24px;
}
::selection{background:var(--accent-soft);color:var(--ink);}
button{font-family:inherit;cursor:pointer;}
input{font-family:inherit;}
a{color:inherit;}

@media (prefers-reduced-motion: reduce){
  *{animation-duration:.001ms !important;animation-iteration-count:1 !important;transition-duration:.001ms !important;}
}

.wrap{width:100%;max-width:380px;animation:fadeIn .5s cubic-bezier(.22,1,.36,1);}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

.brand{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;margin-bottom:32px;}
.brand::before{
  content:"VOLUME 01 / ISSUE 01";
  font-family:var(--font-body);
  font-size:9px;
  font-weight:700;
  letter-spacing:0.2em;
  text-transform:uppercase;
  color:var(--ink-faint);
  line-height:1;
}
.brand-mark{
  font-family:var(--font-display);font-weight:900;font-size:32px;letter-spacing:-0.03em;text-transform:uppercase;line-height:1;
}
.brand-mark em{color:var(--ink);font-style:italic;font-weight:900;}

.card{
  background:var(--bg-card);border:1px solid var(--border);border-radius:8px;
  padding:36px 32px;box-shadow:var(--shadow);
}
.card-title{font-family:var(--font-display);font-size:24px;font-weight:700;margin:0 0 6px;}
.card-sub{font-size:13.5px;color:var(--ink-dim);margin:0 0 26px;line-height:1.6;}

.field{margin-bottom:18px;}
.field label{
  display:block;font-family:var(--font-mono);font-size:10px;color:var(--ink-faint);
  text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px;
}
.field input{
  width:100%;background:var(--bg-1);border:1px solid var(--border);color:var(--ink);
  border-radius:6px;padding:12px 14px;font-size:16px;outline:none;
  transition:border-color .2s ease, box-shadow .2s ease;
}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-soft);}

/* Autofill styling to prevent light yellow background in Chrome/Safari */
input:-webkit-autofill,
input:-webkit-autofill:hover, 
input:-webkit-autofill:focus, 
input:-webkit-autofill:active {
  -webkit-background-clip: text;
  -webkit-text-fill-color: var(--ink) !important;
  transition: background-color 5000s ease-in-out 0s;
  box-shadow: inset 0 0 20px 20px var(--bg-1) !important;
}

.submit-btn{
  width:100%;background:var(--accent);color:var(--accent-ink);border:1px solid var(--accent);
  padding:13px;border-radius:6px;font-weight:600;font-size:14px;margin-top:6px;
  letter-spacing:0.05em;text-transform:uppercase;
  transition:transform .2s ease, background-color .2s ease, color .2s ease;
}
.submit-btn:hover{transform:translateY(-1px);background:var(--bg-1);color:var(--ink);border-color:var(--ink);}
.submit-btn:disabled{opacity:.55;transform:none;box-shadow:none;cursor:default;}

.msg{
  font-size:13px;padding:12px;border-radius:6px;margin-top:16px;line-height:1.5;display:none;
  font-family:var(--font-mono);border:1px solid transparent;
}
.msg.show{display:block;}
.msg.err{background:var(--error-soft);color:var(--error);border-color:rgba(183,28,28,0.15);}
.msg.ok{background:var(--success-soft);color:var(--success);border-color:rgba(27,94,32,0.15);}

.foot{text-align:center;margin-top:24px;font-size:13px;color:var(--ink-dim);}
.foot a{color:var(--ink);font-weight:700;text-decoration:underline;text-underline-offset:4px;}
.foot a:hover{opacity:0.8;}

.forgot{text-align:right;margin:-10px 0 20px;}
.forgot button{
  background:none;border:none;color:var(--ink-faint);font-size:12px;padding:0;
  text-decoration:underline;text-underline-offset:3px;font-family:var(--font-mono);cursor:pointer;
}
.forgot button:hover{color:var(--ink-dim);}

@media (max-width: 480px) {
  body {
    padding: 16px;
  }
  .card {
    padding: 24px 20px;
  }
  .brand {
    margin-bottom: 24px;
  }
  .card-title {
    font-size: 20px;
  }
  .card-sub {
    font-size: 12.5px;
    margin-bottom: 18px;
  }
  .field {
    margin-bottom: 14px;
  }
  .submit-btn {
    padding: 11px;
    font-size: 13px;
  }
}
</style>
</head>
<body>

<div class="wrap">
  <div class="brand">
    <div class="brand-mark">Lex<em>icon</em></div>
  </div>

  <div class="card">
    <div class="card-title">Welcome back</div>
    <p class="card-sub">Log in to pick up your vocabulary right where you left it.</p>

    <form id="loginForm">
      <div class="field">
        <label for="email">Email or Username</label>
        <input type="text" id="email" autocomplete="username" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" autocomplete="current-password" required />
      </div>
      <div class="forgot">
        <button type="button" id="forgotBtn">Forgot password?</button>
      </div>
      <button type="submit" class="submit-btn" id="submitBtn">Log in</button>
      <div class="msg" id="msg"></div>
    </form>

    <div class="foot">Don't have an account? <a href="signup.html">Sign up</a></div>
  </div>
</div>

<script type="module">
  import { auth, db } from './firebase-config.js';
  import {
    signInWithEmailAndPassword,
    onAuthStateChanged,
    sendPasswordResetEmail
  } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-auth.js";
  import {
    ref, query, orderByChild, equalTo, get
  } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-database.js";

  // Already logged in? Skip straight to the app.
  onAuthStateChanged(auth, (user) => {
    if (user) window.location.href = 'app.html';
  });

  const form = document.getElementById('loginForm');
  const msg = document.getElementById('msg');
  const submitBtn = document.getElementById('submitBtn');
  const emailInput = document.getElementById('email');

  function showMsg(text, type){
    msg.textContent = text;
    msg.className = 'msg show ' + type;
  }

  // Coming from a successful signup? Greet them.
  if (new URLSearchParams(window.location.search).get('signedUp') === '1') {
    showMsg('Account created — log in below to start learning.', 'ok');
  }

  function friendlyError(code){
    switch(code){
      case 'auth/invalid-email': return 'That email address doesn\'t look right.';
      case 'auth/user-not-found':
      case 'auth/invalid-credential':
      case 'auth/wrong-password': return 'Incorrect email, username, or password.';
      case 'auth/too-many-requests': return 'Too many attempts. Please wait a moment and try again.';
      default: return 'Something went wrong. Please try again.';
    }
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    submitBtn.disabled = true;
    submitBtn.textContent = 'Logging in…';
    msg.className = 'msg';

    let loginIdentifier = emailInput.value.trim();
    const password = document.getElementById('password').value;

    try {
      let email = loginIdentifier;
      // If the identifier doesn't look like an email (doesn't contain '@'), look up the username.
      if (!loginIdentifier.includes('@')) {
        const usersRef = ref(db, 'users');
        const usernameQuery = query(usersRef, orderByChild('username'), equalTo(loginIdentifier));
        const snapshot = await get(usernameQuery);
        
        if (!snapshot.exists()) {
          throw { code: 'auth/invalid-credential' };
        }
        
        let foundEmail = null;
        snapshot.forEach((child) => {
          const val = child.val();
          if (val && val.email) {
            foundEmail = val.email;
          }
        });
        
        if (!foundEmail) {
          throw { code: 'auth/invalid-credential' };
        }
        email = foundEmail;
      }

      await signInWithEmailAndPassword(auth, email, password);
      window.location.href = 'app.html';
    } catch (err) {
      showMsg(friendlyError(err.code), 'err');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Log in';
    }
  });

  document.getElementById('forgotBtn').addEventListener('click', async () => {
    const loginIdentifier = emailInput.value.trim();
    if (!loginIdentifier) {
      showMsg('Enter your email or username above first, then tap "Forgot password?" again.', 'err');
      return;
    }
    
    try {
      let email = loginIdentifier;
      if (!loginIdentifier.includes('@')) {
        const usersRef = ref(db, 'users');
        const usernameQuery = query(usersRef, orderByChild('username'), equalTo(loginIdentifier));
        const snapshot = await get(usernameQuery);
        
        if (!snapshot.exists()) {
          showMsg('No account found with that username.', 'err');
          return;
        }
        
        let foundEmail = null;
        snapshot.forEach((child) => {
          const val = child.val();
          if (val && val.email) {
            foundEmail = val.email;
          }
        });
        
        if (!foundEmail) {
          showMsg('No email address associated with that username.', 'err');
          return;
        }
        email = foundEmail;
      }

      await sendPasswordResetEmail(auth, email);
      showMsg('Password reset email sent — check your inbox.', 'ok');
    } catch (err) {
      showMsg(friendlyError(err.code), 'err');
    }
  });
</script>
</body>
</html>
