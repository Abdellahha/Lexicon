<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sign up — Lexicon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A0D14;
  --bg-1:#151922;
  --bg-card:#10131A;
  --ink:#F1F5F9;
  --ink-dim:#94A3B8;
  --ink-faint:#64748B;
  --accent:#38BDF8;
  --accent-ink:#0F172A;
  --accent-soft:rgba(56,189,248,0.08);
  --accent-line:rgba(56,189,248,0.25);
  --error:#F87171;
  --error-soft:rgba(248,113,113,0.08);
  --success:#4ADE80;
  --success-soft:rgba(74,222,128,0.08);
  --border:rgba(255,255,255,0.08);
  --font-display:'Fraunces',serif;
  --font-body:'Inter',-apple-system,sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  --shadow:0 12px 45px -10px rgba(0,0,0,0.5);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:var(--font-body);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  display:flex;align-items:center;justify-content:center;
  padding:24px;
}
::selection{background:var(--accent-soft);color:var(--ink);}
button{font-family:inherit;cursor:pointer;}
input{font-family:inherit;}
a{color:inherit;}

@media (prefers-reduced-motion: reduce){
  *{animation-duration:.001ms !important;animation-iteration-count:1 !important;transition-duration:.001ms !important;}
}

.wrap{width:100%;max-width:380px;animation:fadeIn .5s cubic-bezier(.22,1,.36,1);}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

.brand{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;margin-bottom:32px;}
.brand::before{
  content:"VOLUME 01 / ISSUE 01";
  font-family:var(--font-body);
  font-size:9px;
  font-weight:700;
  letter-spacing:0.2em;
  text-transform:uppercase;
  color:var(--ink-faint);
  line-height:1;
}
.brand-mark{
  font-family:var(--font-display);font-weight:900;font-size:32px;letter-spacing:-0.03em;text-transform:uppercase;line-height:1;
}
.brand-mark em{color:var(--ink);font-style:italic;font-weight:900;}

.card{
  background:var(--bg-card);border:1px solid var(--border);border-radius:8px;
  padding:36px 32px;box-shadow:var(--shadow);
}
.card-title{font-family:var(--font-display);font-size:24px;font-weight:700;margin:0 0 6px;}
.card-sub{font-size:13.5px;color:var(--ink-dim);margin:0 0 26px;line-height:1.6;}

.field{margin-bottom:18px;}
.field label{
  display:block;font-family:var(--font-mono);font-size:10px;color:var(--ink-faint);
  text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px;
}
.field input, .field select{
  width:100%;background:var(--bg-1);border:1px solid var(--border);color:var(--ink);
  border-radius:6px;padding:12px 14px;font-size:16px;outline:none;
  transition:border-color .2s ease, box-shadow .2s ease;
}
.field select option {
  background: #151922;
  color: #F1F5F9;
}
.field input:focus, .field select:focus{border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-soft);}
.field-hint{font-size:11px;color:var(--ink-faint);margin-top:6px;font-family:var(--font-mono);}

.submit-btn{
  width:100%;background:var(--accent);color:var(--accent-ink);border:1px solid var(--accent);
  padding:13px;border-radius:6px;font-weight:600;font-size:14px;margin-top:6px;
  letter-spacing:0.05em;text-transform:uppercase;
  transition:transform .2s ease, background-color .2s ease, color .2s ease;
}
.submit-btn:hover{transform:translateY(-1px);background:var(--bg-1);color:var(--ink);border-color:var(--ink);}
.submit-btn:disabled{opacity:.55;transform:none;box-shadow:none;cursor:default;}

.msg{
  font-size:13px;padding:12px;border-radius:6px;margin-top:16px;line-height:1.5;display:none;
  font-family:var(--font-mono);border:1px solid transparent;
}
.msg.show{display:block;}
.msg.err{background:var(--error-soft);color:var(--error);border-color:rgba(183,28,28,0.15);}
.msg.ok{background:var(--success-soft);color:var(--success);border-color:rgba(27,94,32,0.15);}

.foot{text-align:center;margin-top:24px;font-size:13px;color:var(--ink-dim);}
.foot a{color:var(--ink);font-weight:700;text-decoration:underline;text-underline-offset:4px;}
.foot a:hover{opacity:0.8;}

@media (max-width: 480px) {
  body {
    padding: 16px;
  }
  .card {
    padding: 24px 20px;
  }
  .brand {
    margin-bottom: 24px;
  }
  .card-title {
    font-size: 20px;
  }
  .card-sub {
    font-size: 12.5px;
    margin-bottom: 18px;
  }
  .field {
    margin-bottom: 14px;
  }
  .submit-btn {
    padding: 11px;
    font-size: 13px;
  }
}
</style>
</head>
<body>

<div class="wrap">
  <div class="brand">
    <div class="brand-mark">Lex<em>icon</em></div>
  </div>

  <div class="card">
    <div class="card-title">Create your account</div>
    <p class="card-sub">Your progress, score, and streak will follow you to any device.</p>

    <form id="signupForm">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" autocomplete="nickname" minlength="2" maxlength="30" required />
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" autocomplete="email" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" autocomplete="new-password" minlength="6" required />
        <div class="field-hint">At least 6 characters.</div>
      </div>
      <div class="field">
        <label for="confirm">Confirm password</label>
        <input type="password" id="confirm" autocomplete="new-password" minlength="6" required />
      </div>
      <div class="field">
        <label for="englishLevel">English level</label>
        <select id="englishLevel" required>
          <option value="all" selected>All Levels (A1–C1)</option>
          <option value="A1">A1 — Beginner</option>
          <option value="A2">A2 — Elementary</option>
          <option value="B1">B1 — Intermediate</option>
          <option value="B2">B2 — Upper Intermediate</option>
          <option value="C1">C1 — Advanced</option>
        </select>
        <div class="field-hint">Your customized vocabulary pack will target this CEFR level.</div>
      </div>
      <div class="field">
        <label for="wordsPerDay">Daily words goal</label>
        <select id="wordsPerDay" required>
          <option value="5">5 words per day (Casual)</option>
          <option value="10" selected>10 words per day (Regular)</option>
          <option value="15">15 words per day (Serious)</option>
          <option value="20">20 words per day (Insane)</option>
        </select>
        <div class="field-hint">The target number of new words to learn every day.</div>
      </div>
      <button type="submit" class="submit-btn" id="submitBtn">Sign up</button>
      <div class="msg" id="msg"></div>
    </form>

    <div class="foot">Already have an account? <a href="index.html">Log in</a></div>
  </div>
</div>

<script type="module">
  import { auth, db } from './firebase-config.js';
  import {
    createUserWithEmailAndPassword,
    updateProfile,
    onAuthStateChanged,
    signOut
  } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-auth.js";
  import {
    ref, set, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-database.js";

  // Already logged in (on page load)? Skip straight to the app.
  // Ignored while a signup is actively in progress, since creating the
  // account also signs the user in for a moment before we sign them out.
  let signupInProgress = false;
  onAuthStateChanged(auth, (user) => {
    if (user && !signupInProgress) window.location.href = 'app.html';
  });

  const form = document.getElementById('signupForm');
  const msg = document.getElementById('msg');
  const submitBtn = document.getElementById('submitBtn');

  function showMsg(text, type){
    msg.textContent = text;
    msg.className = 'msg show ' + type;
  }

  function friendlyError(code){
    switch(code){
      case 'auth/email-already-in-use': return 'An account with this email already exists.';
      case 'auth/invalid-email': return 'That email address doesn\'t look right.';
      case 'auth/weak-password': return 'Password should be at least 6 characters.';
      default: return 'Something went wrong. Please try again.';
    }
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm').value;
    const englishLevel = document.getElementById('englishLevel').value;
    const wordsPerDay = parseInt(document.getElementById('wordsPerDay').value, 10) || 10;

    msg.className = 'msg';

    if (password !== confirm) {
      showMsg('Passwords don\'t match.', 'err');
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Creating account…';
    signupInProgress = true;

    try {
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      await updateProfile(cred.user, { displayName: username });

      // Create the user's profile + fresh progress record in the Realtime Database.
      await set(ref(db, 'users/' + cred.user.uid), {
        username: username,
        email: email,
        englishLevel: englishLevel,
        wordsPerDay: wordsPerDay,
        createdAt: serverTimestamp(),
        progress: { learned: {}, index: 0, score: 0, streak: 0 }
      });

      // Account created — sign back out so the person logs in explicitly.
      await signOut(auth);

      showMsg('Account created! Redirecting you to log in…', 'ok');
      setTimeout(() => {
        window.location.href = 'index.html?signedUp=1';
      }, 900);
    } catch (err) {
      signupInProgress = false;
      showMsg(friendlyError(err.code), 'err');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Sign up';
    }
  });
</script>
</body>
</html>
